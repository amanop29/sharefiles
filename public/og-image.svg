<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0e0c"/>
  
  <!-- Subtle grid lines -->
  <g stroke="#f7f5f0" stroke-width="0.4" opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent circle glow (top right) -->
  <circle cx="1050" cy="120" r="280" fill="#1a56ff" opacity="0.07"/>
  
  <!-- Accent circle glow (bottom left) -->
  <circle cx="150" cy="530" r="200" fill="#1a56ff" opacity="0.05"/>

  <!-- Left column — branding -->
  <g>
    <!-- Eyebrow rule + text -->
    <rect x="80" y="180" width="32" height="1" fill="#7a7873"/>
    <text x="122" y="181" font-family="Georgia, serif" font-size="13" fill="#7a7873" letter-spacing="3" dominant-baseline="middle">ANONYMOUS FILE SHARING</text>

    <!-- Main headline — serif italic + regular split -->
    <text x="80" y="268" font-family="Georgia, serif" font-size="82" fill="#f7f5f0" font-weight="400" letter-spacing="-3">Share files,</text>
    <text x="80" y="360" font-family="Georgia, serif" font-size="82" fill="#1a56ff" font-style="italic" font-weight="400" letter-spacing="-3">leave no trace.</text>

    <!-- Subtitle -->
    <text x="80" y="418" font-family="system-ui, sans-serif" font-size="18" fill="#7a7873" font-weight="400" letter-spacing="0">No account. No storage. No tracking.</text>

    <!-- Trust pills row -->
    <!-- Pill 1 -->
    <rect x="80" y="456" width="116" height="30" rx="15" fill="#1c1c1a" stroke="#3a3834" stroke-width="1"/>
    <circle cx="100" cy="471" r="4" fill="#16a34a"/>
    <text x="112" y="471" font-family="system-ui, sans-serif" font-size="12" fill="#7a7873" dominant-baseline="middle">No tracking</text>

    <!-- Pill 2 -->
    <rect x="208" y="456" width="138" height="30" rx="15" fill="#1c1c1a" stroke="#3a3834" stroke-width="1"/>
    <circle cx="228" cy="471" r="4" fill="#16a34a"/>
    <text x="240" y="471" font-family="system-ui, sans-serif" font-size="12" fill="#7a7873" dominant-baseline="middle">Auto-deletes</text>

    <!-- Pill 3 -->
    <rect x="358" y="456" width="156" height="30" rx="15" fill="#1c1c1a" stroke="#3a3834" stroke-width="1"/>
    <circle cx="378" cy="471" r="4" fill="#16a34a"/>
    <text x="390" y="471" font-family="system-ui, sans-serif" font-size="12" fill="#7a7873" dominant-baseline="middle">100MB free</text>

  </g>

  <!-- Right column — UI mockup card -->
  <g>
    <!-- Card shadow layer -->
    <rect x="742" y="122" width="378" height="406" rx="16" fill="#1a56ff" opacity="0.12"/>

    <!-- Card body -->
    <rect x="734" y="114" width="378" height="406" rx="16" fill="#1c1c1a" stroke="#2a2a27" stroke-width="1"/>

    <!-- Card top bar -->
    <rect x="734" y="114" width="378" height="48" rx="16" fill="#252522"/>
    <rect x="734" y="146" width="378" height="16" fill="#252522"/>
    <!-- Traffic lights -->
    <circle cx="762" cy="138" r="5" fill="#ff5f56" opacity="0.7"/>
    <circle cx="780" cy="138" r="5" fill="#ffbd2e" opacity="0.7"/>
    <circle cx="798" cy="138" r="5" fill="#27c93f" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="818" y="128" width="180" height="20" rx="5" fill="#1c1c1a"/>
    <text x="908" y="138" font-family="system-ui, sans-serif" font-size="10" fill="#7a7873" text-anchor="middle" dominant-baseline="middle">sharefiles.app</text>

    <!-- Card content area -->
    <!-- Drop zone -->
    <rect x="758" y="182" width="330" height="150" rx="10" fill="none" stroke="#3a3834" stroke-width="1.5" stroke-dasharray="6 4"/>
    
    <!-- Upload icon box -->
    <rect x="893" y="210" width="36" height="36" rx="8" fill="#0f0e0c"/>
    <!-- Upload arrow -->
    <path d="M911 232 L911 222 M907 226 L911 222 L915 226" stroke="#f7f5f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M906 234 L916 234" stroke="#f7f5f0" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <text x="923" y="261" font-family="Georgia, serif" font-size="13" fill="#f7f5f0" text-anchor="middle" dominant-baseline="middle">Drop your file here</text>
    <text x="923" y="281" font-family="system-ui, sans-serif" font-size="10" fill="#7a7873" text-anchor="middle" dominant-baseline="middle">or click to browse · max 100MB</text>
    
    <!-- Expiry selector -->
    <text x="758" y="352" font-family="system-ui, sans-serif" font-size="9" fill="#7a7873" letter-spacing="2">EXPIRY TIME</text>
    
    <!-- 15m chip -->
    <rect x="758" y="362" width="96" height="32" rx="7" fill="#1c1c1a" stroke="#3a3834" stroke-width="1"/>
    <text x="806" y="378" font-family="Georgia, serif" font-size="14" fill="#7a7873" text-anchor="middle" dominant-baseline="middle">15m</text>
    
    <!-- 1h chip active -->
    <rect x="864" y="362" width="96" height="32" rx="7" fill="#f7f5f0"/>
    <text x="912" y="378" font-family="Georgia, serif" font-size="14" fill="#0f0e0c" text-anchor="middle" dominant-baseline="middle">1h</text>
    
    <!-- 24h chip -->
    <rect x="970" y="362" width="96" height="32" rx="7" fill="#1c1c1a" stroke="#3a3834" stroke-width="1"/>
    <text x="1018" y="378" font-family="Georgia, serif" font-size="14" fill="#7a7873" text-anchor="middle" dominant-baseline="middle">24h</text>

    <!-- Upload button -->
    <rect x="758" y="408" width="330" height="44" rx="10" fill="#1a56ff"/>
    <text x="923" y="430" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="500" text-anchor="middle" dominant-baseline="middle">Upload File →</text>

    <!-- Share code result strip (bottom of card, overlapping slightly) -->
    <rect x="734" y="476" width="378" height="44" rx="0" fill="#111110" stroke="none"/>
    <rect x="734" y="498" width="378" height="22" rx="0" fill="#111110"/>
    <rect x="734" y="476" width="378" height="44" rx="16" fill="#111110"/>
    <rect x="734" y="476" width="378" height="22" fill="#111110"/>

    <!-- Code -->
    <text x="762" y="500" font-family="'Courier New', monospace" font-size="20" fill="#1a56ff" font-weight="600" letter-spacing="6" dominant-baseline="middle">FTB8VD</text>
    <!-- Copy hint -->
    <rect x="1022" y="486" width="72" height="28" rx="7" fill="#1c1c1a" stroke="#3a3834" stroke-width="1"/>
    <text x="1058" y="500" font-family="system-ui, sans-serif" font-size="11" fill="#7a7873" text-anchor="middle" dominant-baseline="middle">Copy code</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0a09"/>
  
  <!-- Logo in bottom bar -->
  <!-- Favicon mark -->
  <rect x="80" y="602" width="18" height="18" rx="4" fill="#f7f5f0"/>
  <rect x="83" y="605" width="8" height="10" rx="1" fill="#0f0e0c"/>
  <path d="M88 605 L91 608 L88 608 Z" fill="#f7f5f0" opacity="0.6"/>
  <circle cx="94" cy="614" r="4" fill="#1a56ff"/>
  <path d="M92.5 615.5 L95.5 612.5" stroke="white" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  <path d="M93.5 612.5 L95.5 612.5 L95.5 614.5" stroke="white" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <text x="106" y="615" font-family="Georgia, serif" font-size="14" fill="#f7f5f0" dominant-baseline="middle">Share<tspan font-style="italic" fill="#1a56ff">Files</tspan></text>
  
  <text x="1120" y="615" font-family="system-ui, sans-serif" font-size="11" fill="#3a3834" text-anchor="end" dominant-baseline="middle">sharefiles.app</text>

</svg>
